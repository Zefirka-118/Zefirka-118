<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220">

<defs>
<linearGradient id="bg" x1="0" x2="1">
<stop offset="0%" stop-color="#061a2b"/>
<stop offset="100%" stop-color="#0a3b52"/>
</linearGradient>
</defs>

<rect width="100%" height="100%" fill="url(#bg)"/>

<text x="40" y="70" font-size="36" fill="white" font-family="Arial">
Zefrik
</text>

<text x="40" y="105" font-size="15" fill="#cbd5e1" font-family="Arial">
Estudiante de Ingeniería en Software — Prototipos embebidos y automatización
</text>

<!-- Python -->
<image href="Python-Symbol_0.png" x="850" y="40" width="70" height="70">
<animate attributeName="opacity"
values="1;1;0;0;1"
keyTimes="0;0.33;0.34;0.99;1"
dur="9s"
repeatCount="indefinite"/>
</image>

<!-- C++ -->
<image href="ISO_C++_Logo.svg" x="850" y="40" width="70" height="70">
<animate attributeName="opacity"
values="0;0;1;1;0"
keyTimes="0;0.33;0.66;0.67;1"
dur="9s"
repeatCount="indefinite"/>
</image>

<!-- Arduino -->
<image href="Arduino_Logo_Registered.svg" x="850" y="40" width="70" height="70">
<animate attributeName="opacity"
values="0;0;0;1;1"
keyTimes="0;0.66;0.67;0.99;1"
dur="9s"
repeatCount="indefinite"/>
</image>

<!-- dots -->
<circle cx="960" cy="75" r="5" fill="white">
<animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" repeatCount="indefinite"/>
</circle>

<circle cx="980" cy="75" r="5" fill="white">
<animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
</circle>

<circle cx="1000" cy="75" r="5" fill="white">
<animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
</circle>

</svg>
