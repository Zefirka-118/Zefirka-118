<!-- Guarda como: assets/header.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" role="img" aria-label="Header">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#061a2b"/>
      <stop offset="100%" stop-color="#0a3b52"/>
    </linearGradient>
  </defs>

  <!-- fondo -->
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- texto izquierdo -->
  <g font-family="Inter, Arial, Helvetica, sans-serif" fill="#ffffff">
    <text x="40" y="72" font-size="34" font-weight="600">Zefrik</text>
    <text x="40" y="104" font-size="14" fill="#cbd5e1">
      Estudiante de Ingeniería en Software — Prototipos embebidos y automatización
    </text>
  </g>

  <!-- zona derecha (logos + puntos) -->
  <g transform="translate(820,44)" id="logos-area">

    <!-- PYTHON group -->
    <g id="pythonGroup" opacity="1">
      <image 
        href="https://raw.githubusercontent.com/Zefirka-118/Zefirka-118/main/assets/Python-Symbol_0.png"
        width="64" height="64" x="0" y="0" preserveAspectRatio="xMidYMid meet"/>
      <!-- fallback texto si imagen no carga -->
      <g transform="translate(0,0)" opacity="0">
        <rect x="0" y="0" width="120" height="64" rx="8" fill="#0f172a" opacity="0.85"/>
        <text x="60" y="38" font-size="18" text-anchor="middle" fill="#fff" font-family="Inter, Arial">Python</text>
      </g>
      <!-- animación de opacidad para la secuencia -->
      <animate attributeName="opacity"
               dur="9s" repeatCount="indefinite"
               values="1;1;0;0;1"
               keyTimes="0;0.33;0.34;0.99;1"/>
    </g>

    <!-- C++ group -->
    <g id="cppGroup" opacity="0">
      <image 
        href="https://raw.githubusercontent.com/Zefirka-118/Zefirka-118/main/assets/ISO_C++_Logo.svg.png"
        width="64" height="64" x="0" y="0" preserveAspectRatio="xMidYMid meet"/>
      <g transform="translate(0,0)" opacity="0">
        <rect x="0" y="0" width="120" height="64" rx="8" fill="#0f172a" opacity="0.85"/>
        <text x="60" y="38" font-size="18" text-anchor="middle" fill="#fff" font-family="Inter, Arial">C++</text>
      </g>
      <animate attributeName="opacity"
               dur="9s" repeatCount="indefinite"
               values="0;0;1;1;0"
               keyTimes="0;0.33;0.66;0.67;1"/>
    </g>

    <!-- ARDUINO group -->
    <g id="arduinoGroup" opacity="0">
      <image 
        href="https://raw.githubusercontent.com/Zefirka-118/Zefirka-118/main/assets/Arduino_Logo_Registered.svg.png"
        width="64" height="64" x="0" y="0" preserveAspectRatio="xMidYMid meet"/>
      <g transform="translate(0,0)" opacity="0">
        <rect x="0" y="0" width="120" height="64" rx="8" fill="#0f172a" opacity="0.85"/>
        <text x="60" y="38" font-size="18" text-anchor="middle" fill="#fff" font-family="Inter, Arial">Arduino</text>
      </g>
      <animate attributeName="opacity"
               dur="9s" repeatCount="indefinite"
               values="0;0;0;1;1"
               keyTimes="0;0.66;0.67;0.99;1"/>
    </g>

    <!-- Loading dots (a la derecha) -->
    <g id="dots" transform="translate(140,30)" fill="#ffffff" opacity="0.95">
      <circle cx="0" cy="0" r="6" opacity="0.25">
        <animate attributeName="opacity" values="0.25;1;0.25" dur="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="24" cy="0" r="6" opacity="0.25">
        <animate attributeName="opacity" values="0.25;1;0.25" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="48" cy="0" r="6" opacity="0.25">
        <animate attributeName="opacity" values="0.25;1;0.25" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
    </g>

  </g>
</svg>
